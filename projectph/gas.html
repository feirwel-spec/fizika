<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Идеальный газ (МКТ)</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-decorations">
        <svg class="bg-decor" style="top: -5%; left: -5%; width: 450px; height: 450px;" viewBox="0 0 200 200">
            <rect x="80" y="20" width="40" height="160" rx="20" stroke-width="3"/>
            <circle cx="100" cy="150" r="10" fill="#202124"/>
            <line x1="100" y1="140" x2="100" y2="40" stroke-width="4"/>
            <line x1="120" y1="60" x2="130" y2="60" stroke-width="2"/>
            <line x1="120" y1="80" x2="130" y2="80" stroke-width="2"/>
            <line x1="120" y1="100" x2="130" y2="100" stroke-width="2"/>
            <line x1="120" y1="120" x2="130" y2="120" stroke-width="2"/>
        </svg>
        <svg class="bg-decor" style="bottom: -10%; right: -5%; width: 500px; height: 500px;" viewBox="0 0 200 200">
            <circle cx="50" cy="50" r="15" stroke-width="3"/>
            <circle cx="120" cy="80" r="15" stroke-width="3"/>
            <circle cx="80" cy="150" r="15" stroke-width="3"/>
            <path d="M 65 50 L 105 80" stroke-width="2" stroke-dasharray="4 4"/>
            <path d="M 115 95 L 90 140" stroke-width="2" stroke-dasharray="4 4"/>
            <line x1="50" y1="50" x2="70" y2="30" stroke-width="2"/>
            <polygon points="73,27 63,30 70,37" fill="#202124"/>
            <line x1="120" y1="80" x2="150" y2="70" stroke-width="2"/>
            <polygon points="153,69 143,65 147,75" fill="#202124"/>
        </svg>
    </div>

    <div class="header-bar">
        <a href="index.html" class="icon-btn" title="Вернуться в меню">
            <span class="material-icons">arrow_back</span>
        </a>
        <h1>Идеальный газ (МКТ)</h1>
    </div>

    <div class="layout">
        <div class="card canvas-container">
            <div class="canvas-header">
                Окно симуляции
                <div class="pressure-badge" id="pressureBadge">
                    <span class="material-icons" style="font-size: 18px;">compress</span>
                    Давление: <span id="pressureVal">100</span> кПа
                </div>
            </div>
            <canvas id="simCanvas" width="600" height="400"></canvas>
        </div>

        <div class="card controls-container">
            <div class="control-group">
                <label>Количество частиц (N) <span id="nVal" class="val-display">150</span></label>
                <input type="range" id="particleCount" min="10" max="400" step="10" value="150">
            </div>

            <div class="control-group">
                <label>Температура (T) <span id="tVal" class="val-display">300 К</span></label>
                <input type="range" id="temperature" min="50" max="1000" step="10" value="300">
            </div>

            <div class="control-group">
                <label>Объем камеры (V) <span id="vVal" class="val-display">100%</span></label>
                <input type="range" id="volume" min="30" max="100" step="1" value="100">
            </div>

            <button id="resetBtn" class="btn-danger">Перезапустить</button>
        </div>
    </div>

    <div class="watermark">TSOYILYA</div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        let currentN = parseInt(document.getElementById('particleCount').value);
        let currentT = parseInt(document.getElementById('temperature').value);
        let currentV = parseInt(document.getElementById('volume').value);
        
        let boxWidth = (canvas.width - 20) * (currentV / 100);
        let boxHeight = canvas.height - 40;
        let startX = 10;
        let startY = 20;

        function getBaseSpeed(temp) {
            return Math.sqrt(temp) * 0.15;
        }

        function initParticles(count) {
            particles = [];
            let baseV = getBaseSpeed(currentT);
            for (let i = 0; i < count; i++) {
                let r = 4;
                let x = startX + r + Math.random() * (boxWidth - 2 * r);
                let y = startY + r + Math.random() * (boxHeight - 2 * r);
                let angle = Math.random() * Math.PI * 2;
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * baseV,
                    vy: Math.sin(angle) * baseV,
                    r: r
                });
            }
        }

        document.getElementById('particleCount').addEventListener('input', (e) => {
            let newN = parseInt(e.target.value);
            document.getElementById('nVal').innerText = newN;
            if (newN > currentN) {
                let baseV = getBaseSpeed(currentT);
                for (let i = 0; i < newN - currentN; i++) {
                    let r = 4;
                    let angle = Math.random() * Math.PI * 2;
                    particles.push({
                        x: startX + r + Math.random() * (boxWidth - 2 * r),
                        y: startY + r + Math.random() * (boxHeight - 2 * r),
                        vx: Math.cos(angle) * baseV,
                        vy: Math.sin(angle) * baseV,
                        r: r
                    });
                }
            } else if (newN < currentN) {
                particles.splice(newN);
            }
            currentN = newN;
        });

        document.getElementById('temperature').addEventListener('input', (e) => {
            let newT = parseInt(e.target.value);
            document.getElementById('tVal').innerText = newT + ' К';
            let ratio = Math.sqrt(newT / currentT);
            for (let p of particles) {
                p.vx *= ratio;
                p.vy *= ratio;
            }
            currentT = newT;
        });

        document.getElementById('volume').addEventListener('input', (e) => {
            currentV = parseInt(e.target.value);
            document.getElementById('vVal').innerText = currentV + '%';
            boxWidth = (canvas.width - 20) * (currentV / 100);
        });

        document.getElementById('resetBtn').addEventListener('click', () => {
            
            currentN = 150;
            currentT = 300;
            currentV = 100;
            boxWidth = (canvas.width - 20) * (currentV / 100);

            document.getElementById('particleCount').value = currentN;
            document.getElementById('temperature').value = currentT;
            document.getElementById('volume').value = currentV;

            document.getElementById('nVal').innerText = currentN;
            document.getElementById('tVal').innerText = currentT + ' К';
            document.getElementById('vVal').innerText = currentV + '%';

            initParticles(currentN);
        });

        function updatePhysics() {
            for (let i = 0; i < particles.length; i++) {
                let p1 = particles[i];
                p1.x += p1.vx;
                p1.y += p1.vy;

                if (p1.x - p1.r < startX) {
                    p1.x = startX + p1.r;
                    p1.vx *= -1;
                } else if (p1.x + p1.r > startX + boxWidth) {
                    p1.x = startX + boxWidth - p1.r;
                    p1.vx *= -1;
                }

                if (p1.y - p1.r < startY) {
                    p1.y = startY + p1.r;
                    p1.vy *= -1;
                } else if (p1.y + p1.r > startY + boxHeight) {
                    p1.y = startY + boxHeight - p1.r;
                    p1.vy *= -1;
                }

                for (let j = i + 1; j < particles.length; j++) {
                    let p2 = particles[j];
                    let dx = p2.x - p1.x;
                    let dy = p2.y - p1.y;
                    let distSq = dx * dx + dy * dy;
                    let minDist = p1.r + p2.r;
                    
                    if (distSq < minDist * minDist) {
                        let dist = Math.sqrt(distSq);
                        let nx = dx / dist;
                        let ny = dy / dist;
                        
                        let overlap = (minDist - dist) / 2;
                        p1.x -= nx * overlap;
                        p1.y -= ny * overlap;
                        p2.x += nx * overlap;
                        p2.y += ny * overlap;
                        
                        let kx = p1.vx - p2.vx;
                        let ky = p1.vy - p2.vy;
                        
                        let p = (nx * kx + ny * ky);
                        
                        p1.vx -= p * nx;
                        p1.vy -= p * ny;
                        p2.vx += p * nx;
                        p2.vy += p * ny;
                    }
                }
            }

            let pressure = (currentN * currentT) / currentV;
            document.getElementById('pressureVal').innerText = (pressure * 0.1).toFixed(1);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#f8f9fa';
            ctx.fillRect(startX, startY, boxWidth, boxHeight);
            
            ctx.strokeStyle = '#bdc1c6';
            ctx.lineWidth = 2;
            ctx.strokeRect(startX, startY, boxWidth, boxHeight);

            ctx.fillStyle = '#70757a';
            ctx.fillRect(startX + boxWidth, startY, 15, boxHeight);
            ctx.fillRect(startX + boxWidth + 15, startY + boxHeight/2 - 5, canvas.width - (startX + boxWidth + 15), 10);

            updatePhysics();

            let maxV = getBaseSpeed(1000) * 1.5;

            for (let p of particles) {
                let speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
                let hue = 240 - Math.min((speed / maxV), 1) * 240; 
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                ctx.fillStyle = `hsl(${hue}, 80%, 55%)`;
                ctx.fill();
            }

            requestAnimationFrame(draw);
        }

        initParticles(currentN);
        draw();
    </script>
</body>
</html>
