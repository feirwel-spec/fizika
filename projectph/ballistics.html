<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Баллистика</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-decorations">
        <svg class="bg-decor" style="top: 5%; left: 5%; width: 300px; height: 300px;" viewBox="0 0 200 200">
            <path d="M 20 100 Q 60 80 100 100 T 180 100" stroke-width="4" stroke-dasharray="10 10"/>
            <path d="M 40 130 Q 80 110 120 130 T 160 130" stroke-width="2" stroke-dasharray="6 6"/>
            <path d="M 60 70 Q 100 50 140 70" stroke-width="2" stroke-dasharray="6 6"/>
        </svg>
        <svg class="bg-decor" style="bottom: -10%; right: -5%; width: 500px; height: 500px;" viewBox="0 0 200 200">
            <path d="M 20 180 Q 80 20 180 180" stroke-width="3"/>
            <line x1="10" y1="180" x2="190" y2="180" stroke-width="4"/>
            <circle cx="100" cy="100" r="8" fill="#202124"/>
            <circle cx="100" cy="100" r="16" fill="none" stroke-width="2"/>
            <circle cx="100" cy="100" r="24" fill="none" stroke-width="2"/>
        </svg>
    </div>
    <div class="header-bar">
        <a href="index.html" class="icon-btn" title="Вернуться в меню">
            <span class="material-icons">arrow_back</span>
        </a>
        <h1>Баллистика</h1>
    </div>
    <div class="layout">
        <div class="card canvas-container">
            <div class="canvas-header">Окно симуляции</div>
            <canvas id="simCanvas" width="600" height="400"></canvas>
        </div>
        <div class="card controls-container">
            <div class="control-group">
                <label>Угол выстрела <span id="angleVal" class="val-display">45°</span></label>
                <input type="range" id="angle" min="0" max="90" value="45">
            </div>
            <div class="control-group">
                <label>Начальная скорость (v0) <span id="velVal" class="val-display">80 м/с</span></label>
                <input type="range" id="velocity" min="10" max="150" value="80">
            </div>
            <div class="control-group">
                <label>Масса снаряда (m) <span id="massVal" class="val-display">5 кг</span></label>
                <input type="range" id="mass" min="1" max="50" value="5">
            </div>
            <div class="control-group">
                <label>Сопротивление воздуха (k) <span id="dragVal" class="val-display">0.05</span></label>
                <input type="range" id="drag" min="0" max="0.5" step="0.01" value="0.05">
            </div>
            <button id="fireBtn" class="btn-primary">Выстрел</button>
            <button id="clearBtn" class="btn-danger">Очистить следы</button>
            <div class="legend">
                <strong style="color: #202124; display: block; margin-bottom: 4px;">Векторы скорости:</strong>
                <span style="color: #ea4335;">▬ Полная скорость (v)</span><br>
                <span style="color: #4285f4;">▬ Горизонтальная (vx)</span><br>
                <span style="color: #0f9d58;">▬ Вертикальная (vy)</span>
            </div>
        </div>
    </div>
    <div class="watermark">TSOYILYA</div>
    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        let projectiles = [];
        let pAngle = 45;
        let pVel = 80;
        let pMass = 5;
        let pDrag = 0.05;
        const g = 9.81;
        const dt = 0.02;
        const groundY = 350;
        const startX = 50;
        document.getElementById('angle').addEventListener('input', (e) => {
            pAngle = parseFloat(e.target.value);
            document.getElementById('angleVal').innerText = pAngle + '°';
        });
        document.getElementById('velocity').addEventListener('input', (e) => {
            pVel = parseFloat(e.target.value);
            document.getElementById('velVal').innerText = pVel + ' м/с';
        });
        document.getElementById('mass').addEventListener('input', (e) => {
            pMass = parseFloat(e.target.value);
            document.getElementById('massVal').innerText = pMass + ' кг';
        });
        document.getElementById('drag').addEventListener('input', (e) => {
            pDrag = parseFloat(e.target.value);
            document.getElementById('dragVal').innerText = pDrag.toFixed(2);
        });
        document.getElementById('fireBtn').addEventListener('click', () => {
            let rad = pAngle * Math.PI / 180;
            let vx = pVel * Math.cos(rad);
            let vy = -pVel * Math.sin(rad);
            projectiles.push({
                x: startX,
                y: groundY,
                vx: vx,
                vy: vy,
                mass: pMass,
                k: pDrag,
                active: true,
                path: [{x: startX, y: groundY}],
                color: `hsl(${Math.random() * 360}, 70%, 50%)`
            });
        });
        document.getElementById('clearBtn').addEventListener('click', () => {
            projectiles = [];
        });
        function drawArrow(x, y, dx, dy, color) {
            let len = Math.sqrt(dx*dx + dy*dy);
            if (len < 0.1) return;
            let angle = Math.atan2(dy, dx);
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x + dx, y + dy);
            ctx.lineTo(x + dx - 10 * Math.cos(angle - Math.PI / 6), y + dy - 10 * Math.sin(angle - Math.PI / 6));
            ctx.moveTo(x + dx, y + dy);
            ctx.lineTo(x + dx - 10 * Math.cos(angle + Math.PI / 6), y + dy - 10 * Math.sin(angle + Math.PI / 6));
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.stroke();
        }
        function updatePhysics() {
            for (let p of projectiles) {
                if (!p.active) continue;
                let vMag = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
                let dragForce = p.k * vMag;
                let ax = - (dragForce * (p.vx / vMag)) / p.mass;
                let ay = g - (dragForce * (p.vy / vMag)) / p.mass;
                if (vMag === 0) { ax = 0; ay = g; }
                p.vx += ax * dt * 10;
                p.vy += ay * dt * 10;
                p.x += p.vx * dt * 10;
                p.y += p.vy * dt * 10;
                p.path.push({x: p.x, y: p.y});
                if (p.y >= groundY) {
                    p.y = groundY;
                    p.active = false;
                }
            }
        }
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            updatePhysics();
            ctx.beginPath();
            ctx.moveTo(0, groundY);
            ctx.lineTo(canvas.width, groundY);
            ctx.lineWidth = 4;
            ctx.strokeStyle = '#5f6368';
            ctx.stroke();
            for (let i = 0; i <= canvas.width; i += 50) {
                ctx.beginPath();
                ctx.moveTo(i, groundY);
                ctx.lineTo(i, groundY + 10);
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#bdc1c6';
                ctx.stroke();
            }
            ctx.save();
            ctx.translate(startX, groundY);
            ctx.rotate(-pAngle * Math.PI / 180);
            ctx.fillStyle = '#5f6368';
            ctx.fillRect(-10, -5, 30, 10);
            ctx.beginPath();
            ctx.arc(0, 0, 12, 0, Math.PI * 2);
            ctx.fillStyle = '#202124';
            ctx.fill();
            ctx.restore();
            for (let p of projectiles) {
                ctx.beginPath();
                for (let i = 0; i < p.path.length; i++) {
                    if (i === 0) ctx.moveTo(p.path[i].x, p.path[i].y);
                    else ctx.lineTo(p.path[i].x, p.path[i].y);
                }
                ctx.strokeStyle = p.color;
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.beginPath();
                ctx.arc(p.x, p.y, 6, 0, Math.PI * 2);
                ctx.fillStyle = '#202124';
                ctx.fill();
                if (p.active) {
                    drawArrow(p.x, p.y, p.vx, 0, '#4285f4');
                    drawArrow(p.x, p.y, 0, p.vy, '#0f9d58');
                    drawArrow(p.x, p.y, p.vx, p.vy, '#ea4335');
                }
            }
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
