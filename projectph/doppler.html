<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Эффект Доплера и Звуковой барьер</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-decorations">
        <svg class="bg-decor" style="top: -5%; left: -5%; width: 500px; height: 500px;" viewBox="0 0 200 200">
            <circle cx="50" cy="100" r="20" stroke-width="2"/>
            <circle cx="70" cy="100" r="40" stroke-width="2"/>
            <circle cx="90" cy="100" r="60" stroke-width="2"/>
            <circle cx="110" cy="100" r="80" stroke-width="2"/>
        </svg>
        <svg class="bg-decor" style="bottom: -10%; right: -5%; width: 450px; height: 450px;" viewBox="0 0 200 200">
            <path d="M 20 20 L 160 100 L 20 180" stroke-width="3" stroke-linejoin="round"/>
            <line x1="20" y1="100" x2="180" y2="100" stroke-width="1" stroke-dasharray="4 4"/>
        </svg>
    </div>
    <div class="header-bar">
        <a href="index.html" class="icon-btn" title="Вернуться в меню">
            <span class="material-icons">arrow_back</span>
        </a>
        <h1>Эффект Доплера</h1>
    </div>
    <div class="layout">
        <div class="card canvas-container">
            <div class="canvas-header">
                Окно симуляции
                <div class="status-badge" id="machStatus">M = 0.50 (Дозвук)</div>
            </div>
            <canvas id="simCanvas" width="600" height="400"></canvas>
        </div>
        <div class="card controls-container">
            <div class="hint">
                <strong style="color:#202124;">Интерактив:</strong> Зеленая точка — это наблюдатель. Перетаскивайте её мышкой, чтобы услышать, как меняется звук в разных точках пространства.
            </div>
            <div class="control-group">
                <label>Скорость источника (v) <span id="vVal" class="val-display">100 px/s</span></label>
                <input type="range" id="vSource" min="0" max="400" value="100">
            </div>
            <div class="control-group">
                <label>Скорость волны (c) <span id="cVal" class="val-display">200 px/s</span></label>
                <input type="range" id="cWave" min="50" max="300" value="200">
            </div>
            <div class="control-group">
                <label>Частота излучения <span id="fVal" class="val-display">Средняя</span></label>
                <input type="range" id="freq" min="2" max="20" value="10">
            </div>
            <button id="soundBtn" class="btn-primary" style="background-color: #0f9d58;">Включить звук</button>
            <button id="clearBtn" class="btn-danger" style="margin-top: 0;">Очистить волны</button>
        </div>
    </div>
    <div class="watermark">TSOYILYA</div>
    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        
        let waves = [];
        let vSrc = 100;
        let cWave = 200;
        let emitFreq = 10;
        let srcX = 50;
        let srcY = 200;
        let dt = 0.016;
        let timer = 0;

        let observer = { x: 450, y: 100, isDragging: false };

        let audioCtx;
        let oscillator;
        let gainNode;
        let soundEnabled = false;

        document.getElementById('soundBtn').addEventListener('click', (e) => {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                oscillator = audioCtx.createOscillator();
                gainNode = audioCtx.createGain();
                oscillator.type = 'sine';
                oscillator.frequency.value = 400;
                gainNode.gain.value = 0;
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.start();
            }
            soundEnabled = !soundEnabled;
            if (soundEnabled) {
                audioCtx.resume();
                e.target.innerText = 'Выключить звук';
                e.target.style.backgroundColor = '#d93025';
            } else {
                gainNode.gain.value = 0;
                e.target.innerText = 'Включить звук';
                e.target.style.backgroundColor = '#0f9d58';
            }
        });

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const mx = (e.clientX - rect.left) * scaleX;
            const my = (e.clientY - rect.top) * scaleY;
            let dx = observer.x - mx;
            let dy = observer.y - my;
            if (Math.sqrt(dx*dx + dy*dy) < 20) {
                observer.isDragging = true;
                canvas.style.cursor = 'grabbing';
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (observer.isDragging) {
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                observer.x = (e.clientX - rect.left) * scaleX;
                observer.y = (e.clientY - rect.top) * scaleY;
            }
        });

        window.addEventListener('mouseup', () => {
            if (observer.isDragging) {
                observer.isDragging = false;
                canvas.style.cursor = 'default';
            }
        });

        document.getElementById('vSource').addEventListener('input', (e) => {
            vSrc = parseInt(e.target.value);
            document.getElementById('vVal').innerText = vSrc + ' px/s';
            updateMach();
        });
        document.getElementById('cWave').addEventListener('input', (e) => {
            cWave = parseInt(e.target.value);
            document.getElementById('cVal').innerText = cWave + ' px/s';
            updateMach();
        });
        document.getElementById('freq').addEventListener('input', (e) => {
            emitFreq = 22 - parseInt(e.target.value);
            let label = emitFreq < 7 ? 'Высокая' : (emitFreq > 15 ? 'Низкая' : 'Средняя');
            document.getElementById('fVal').innerText = label;
        });
        document.getElementById('clearBtn').addEventListener('click', () => {
            waves = [];
            srcX = -20;
        });

        function updateMach() {
            let m = vSrc / cWave;
            let badge = document.getElementById('machStatus');
            let text = `M = ${m.toFixed(2)} `;
            if (m < 1) {
                text += '(Дозвук)';
                badge.style.backgroundColor = '#e8f0fe';
                badge.style.color = '#1a73e8';
            } else if (m === 1) {
                text += '(Звуковой барьер)';
                badge.style.backgroundColor = '#fef7e0';
                badge.style.color = '#ea8600';
            } else {
                text += '(Сверхзвук)';
                badge.style.backgroundColor = '#fce8e6';
                badge.style.color = '#d93025';
            }
            badge.innerText = text;
        }

        function updateAudio() {
            if (soundEnabled && audioCtx) {
                let dx = observer.x - srcX;
                let dy = observer.y - srcY;
                let d = Math.sqrt(dx*dx + dy*dy);
                if (d < 1) d = 1;

                let cosTheta = dx / d;
                let vRad = vSrc * cosTheta;

                let baseFreq = 400;
                let fObs = baseFreq;
                let denom = cWave - vRad;

                if (denom < 0.1) denom = 0.1;
                fObs = baseFreq * (cWave / denom);
                
                if (fObs < 50) fObs = 50;
                if (fObs > 3000) fObs = 3000;

                oscillator.frequency.setTargetAtTime(fObs, audioCtx.currentTime, 0.05);

                let vol = 120 / d;
                if (vol > 0.4) vol = 0.4;
                if (srcX < 0 || srcX > canvas.width) vol = 0;
                gainNode.gain.setTargetAtTime(vol, audioCtx.currentTime, 0.05);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            srcX += vSrc * dt;
            if (srcX > canvas.width + 100) {
                srcX = -50;
                waves = [];
            }

            timer++;
            if (timer >= emitFreq) {
                waves.push({ x: srcX, y: srcY, r: 0 });
                timer = 0;
            }

            ctx.lineWidth = 2;
            for (let i = waves.length - 1; i >= 0; i--) {
                let w = waves[i];
                w.r += cWave * dt;
                
                let alpha = Math.max(0, 1 - w.r / 600);
                ctx.strokeStyle = `rgba(26, 115, 232, ${alpha})`;
                ctx.beginPath();
                ctx.arc(w.x, w.y, w.r, 0, Math.PI * 2);
                ctx.stroke();

                if (w.r > 800) {
                    waves.splice(i, 1);
                }
            }

            if (vSrc > cWave && waves.length > 1) {
                let machAngle = Math.asin(cWave / vSrc);
                let dx = Math.cos(machAngle) * 600;
                let dy = Math.sin(machAngle) * 600;
                
                ctx.strokeStyle = 'rgba(217, 48, 37, 0.5)';
                ctx.lineWidth = 3;
                ctx.setLineDash([10, 10]);
                
                ctx.beginPath();
                ctx.moveTo(srcX, srcY);
                ctx.lineTo(srcX - dx, srcY - dy);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(srcX, srcY);
                ctx.lineTo(srcX - dx, srcY + dy);
                ctx.stroke();
                
                ctx.setLineDash([]);
            }

            ctx.beginPath();
            ctx.arc(srcX, srcY, 6, 0, Math.PI * 2);
            ctx.fillStyle = '#ea4335';
            ctx.fill();

            ctx.beginPath();
            ctx.arc(observer.x, observer.y, 10, 0, Math.PI * 2);
            ctx.fillStyle = '#0f9d58';
            ctx.fill();
            ctx.lineWidth = 3;
            ctx.strokeStyle = 'rgba(15, 157, 88, 0.4)';
            ctx.stroke();
            ctx.fillStyle = '#ffffff';
            ctx.font = '10px Roboto';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('Н', observer.x, observer.y);

            updateAudio();

            requestAnimationFrame(draw);
        }

        updateMach();
        draw();
    </script>
</body>
</html>
