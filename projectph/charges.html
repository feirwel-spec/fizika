<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Взаимодействие зарядов</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Фоновые декорации: Электростатика -->
    <div class="bg-decorations">
        <!-- Электрический диполь -->
        <svg class="bg-decor" style="top: -10%; left: -5%; width: 500px; height: 500px;" viewBox="0 0 200 200">
            <circle cx="60" cy="100" r="20" stroke-width="3"/>
            <circle cx="140" cy="100" r="20" stroke-width="3"/>
            <path d="M 80 100 L 120 100" stroke-width="2"/>
            <path d="M 65 80 Q 100 30 135 80" fill="none" stroke-width="2"/>
            <path d="M 65 120 Q 100 170 135 120" fill="none" stroke-width="2"/>
            <path d="M 50 85 Q 20 10 100 10 Q 180 10 150 85" fill="none" stroke-width="2" stroke-dasharray="6 4"/>
            <path d="M 50 115 Q 20 190 100 190 Q 180 190 150 115" fill="none" stroke-width="2" stroke-dasharray="6 4"/>
            <text x="60" y="105" font-family="sans-serif" font-weight="bold" font-size="16" text-anchor="middle" stroke="none" fill="#202124">+</text>
            <text x="140" y="105" font-family="sans-serif" font-weight="bold" font-size="16" text-anchor="middle" stroke="none" fill="#202124">-</text>
        </svg>
        <!-- Молния -->
        <svg class="bg-decor" style="bottom: -5%; right: -5%; width: 450px; height: 450px;" viewBox="0 0 200 200">
            <path d="M 110 20 L 50 110 L 95 110 L 80 190 L 150 80 L 105 80 Z" stroke-width="3" stroke-linejoin="round"/>
        </svg>
    </div>

    <div class="header-bar">
        <a href="index.html" class="icon-btn" title="Вернуться в меню">
            <span class="material-icons">arrow_back</span>
        </a>
        <h1>Электрические силовые линии</h1>
    </div>

    <div class="layout">
        <div class="card canvas-container black-canvas">
            <div class="canvas-header">
                Окно симуляции
                <div class="header-controls">
                    <span class="canvas-hint">Используйте инструменты справа</span>
                    <button id="resetCamBtn" class="btn-secondary">Центрировать</button>
                </div>
            </div>
            <canvas id="simCanvas" width="600" height="400"></canvas>
        </div>

        <div class="card controls-container">
            
            <div class="control-group">
                <label>Инструмент</label>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="toolType" value="add" checked> ⚡ Ставить заряды
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="toolType" value="pan"> ✋ Двигать камеру
                    </label>
                </div>
            </div>

            <div class="control-group">
                <label>Масштаб камеры <span id="zoomVal" class="val-display" style="color: #0f9d58;">1.0x</span></label>
                <input type="range" id="zoomCam" min="0.2" max="3" step="0.1" value="1">
            </div>

            <div class="control-group" id="chargeTypeGroup">
                <label>Тип нового заряда</label>
                <div class="radio-group">
                    <label class="radio-label">
                        <input type="radio" name="chargeSign" value="1" checked> Положительный (+)
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="chargeSign" value="-1"> Отрицательный (-)
                    </label>
                </div>
            </div>

            <div class="control-group">
                <label>Величина заряда <span id="qVal" class="val-display">1</span></label>
                <input type="range" id="qMag" min="1" max="5" step="1" value="1">
            </div>

            <div class="control-group">
                <label>Сила Кулона <span id="kVal" class="val-display">2000</span></label>
                <input type="range" id="kForce" min="100" max="10000" step="100" value="2000">
            </div>

            <div class="control-group">
                <label>Вязкость среды <span id="fricVal" class="val-display">0.08</span></label>
                <input type="range" id="frictionSlider" min="0" max="0.2" step="0.01" value="0.08">
            </div>

            <button id="clearBtn" class="btn-danger">Очистить холст</button>
        </div>
    </div>

    <div class="watermark">TSOYILYA</div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');

        let charges = [];
        let k = 2000; 
        let currentFriction = 0.92; 
        let qMagnitude = 1;
        let zoom = 1;
        
        let camX = 0;
        let camY = 0;
        let isDragging = false;
        let startMouseX = 0;
        let startMouseY = 0;
        let startCamX = 0;
        let startCamY = 0;
        let currentTool = 'add'; 

        const WORLD_WIDTH = 600;
        const WORLD_HEIGHT = 400;

        document.querySelectorAll('input[name="toolType"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                currentTool = e.target.value;
                canvas.style.cursor = currentTool === 'pan' ? 'grab' : 'crosshair';
            });
        });

        document.getElementById('resetCamBtn').addEventListener('click', () => {
            camX = 0;
            camY = 0;
            zoom = 1;
            document.getElementById('zoomCam').value = 1;
            document.getElementById('zoomVal').innerText = '1.0x';
        });

        document.getElementById('zoomCam').addEventListener('input', (e) => {
            zoom = parseFloat(e.target.value);
            document.getElementById('zoomVal').innerText = zoom.toFixed(1) + 'x';
        });
        document.getElementById('kForce').addEventListener('input', (e) => {
            k = parseInt(e.target.value);
            document.getElementById('kVal').innerText = k;
        });
        document.getElementById('frictionSlider').addEventListener('input', (e) => {
            let viscosity = parseFloat(e.target.value);
            currentFriction = 1 - viscosity;
            document.getElementById('fricVal').innerText = viscosity.toFixed(2);
        });
        document.getElementById('qMag').addEventListener('input', (e) => {
            qMagnitude = parseInt(e.target.value);
            document.getElementById('qVal').innerText = qMagnitude;
        });

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const screenX = (e.clientX - rect.left) * scaleX;
            const screenY = (e.clientY - rect.top) * scaleY;

            if (currentTool === 'pan') {
                isDragging = true;
                startMouseX = screenX;
                startMouseY = screenY;
                startCamX = camX;
                startCamY = camY;
                canvas.style.cursor = 'grabbing';
            } else {
                const cx = canvas.width / 2;
                const cy = canvas.height / 2;
                const x = (screenX - cx - camX) / zoom + cx;
                const y = (screenY - cy - camY) / zoom + cy;
                
                const sign = parseInt(document.querySelector('input[name="chargeSign"]:checked').value);
                const q = sign * qMagnitude; 
                charges.push({ x, y, vx: 0, vy: 0, q, m: 1 });
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging || currentTool !== 'pan') return;
            
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const screenX = (e.clientX - rect.left) * scaleX;
            const screenY = (e.clientY - rect.top) * scaleY;

            camX = startCamX + (screenX - startMouseX);
            camY = startCamY + (screenY - startMouseY);
        });

        window.addEventListener('mouseup', () => {
            if (isDragging) {
                isDragging = false;
                if (currentTool === 'pan') canvas.style.cursor = 'grab';
            }
        });

        document.getElementById('clearBtn').addEventListener('click', () => { charges = []; });

        function updatePhysics() {
            const dt = 0.02;

            for (let i = 0; i < charges.length; i++) {
                let fx = 0, fy = 0;
                for (let j = 0; j < charges.length; j++) {
                    if (i === j) continue;
                    let dx = charges[i].x - charges[j].x;
                    let dy = charges[i].y - charges[j].y;
                    let distSq = dx*dx + dy*dy;
                    let dist = Math.sqrt(distSq);

                    if (dist < 25) dist = 25; 

                    let force = k * (charges[i].q * charges[j].q) / distSq;
                    fx += force * (dx / dist);
                    fy += force * (dy / dist);
                }
                
                charges[i].vx = (charges[i].vx + fx / charges[i].m * dt) * currentFriction;
                charges[i].vy = (charges[i].vy + fy / charges[i].m * dt) * currentFriction;
            }

            for (let c of charges) {
                c.x += c.vx * dt * 15;
                c.y += c.vy * dt * 15;
                
                if (c.vx > 50) c.vx = 50; if (c.vx < -50) c.vx = -50;
                if (c.vy > 50) c.vy = 50; if (c.vy < -50) c.vy = -50;

                let radius = 10 + Math.abs(c.q) * 2; 
                if (c.x < radius || c.x > WORLD_WIDTH - radius) c.vx *= -1;
                if (c.y < radius || c.y > WORLD_HEIGHT - radius) c.vy *= -1;
            }
        }

        function drawContinuousFieldLines() {
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.35)';
            ctx.lineWidth = 1.5;
            const numLinesBase = 10;  
            const step = 4;       
            const maxSteps = 150; 

            for (let c of charges) {
                let isPositive = c.q > 0;
                let numLines = numLinesBase + Math.abs(c.q) * 2; 

                for (let i = 0; i < numLines; i++) {
                    let angle = (Math.PI * 2 / numLines) * i;
                    let radius = 10 + Math.abs(c.q) * 2;
                    let x = c.x + Math.cos(angle) * (radius + 3);
                    let y = c.y + Math.sin(angle) * (radius + 3);

                    ctx.beginPath();
                    ctx.moveTo(x, y);

                    for (let s = 0; s < maxSteps; s++) {
                        let ex = 0, ey = 0;
                        
                        for (let other of charges) {
                            let dx = x - other.x;
                            let dy = y - other.y;
                            let distSq = dx*dx + dy*dy;
                            if (distSq < 1) continue;
                            let dist = Math.sqrt(distSq);
                            let eField = (k * other.q) / distSq;
                            ex += eField * (dx / dist);
                            ey += eField * (dy / dist);
                        }

                        let mag = Math.sqrt(ex*ex + ey*ey);
                        if (mag === 0) break;

                        let dir = isPositive ? 1 : -1;
                        
                        x += dir * (ex / mag) * step;
                        y += dir * (ey / mag) * step;

                        ctx.lineTo(x, y);

                        let hit = false;
                        for (let other of charges) {
                            if (other !== c) {
                                let dx = x - other.x;
                                let dy = y - other.y;
                                let otherRadius = 10 + Math.abs(other.q) * 2;
                                if (dx*dx + dy*dy < otherRadius * otherRadius) {
                                    hit = true; break;
                                }
                            }
                        }
                        if (hit) break;

                        if (x < -2500 || x > WORLD_WIDTH + 2500 || y < -2500 || y > WORLD_HEIGHT + 2500) break;
                    }
                    ctx.stroke();
                }
            }
        }

        function draw() {
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            updatePhysics();

            ctx.translate(canvas.width / 2 + camX, canvas.height / 2 + camY);
            ctx.scale(zoom, zoom);
            ctx.translate(-canvas.width / 2, -canvas.height / 2);

            ctx.strokeStyle = 'rgba(255,255,255,0.1)';
            ctx.lineWidth = 2;
            ctx.strokeRect(0, 0, WORLD_WIDTH, WORLD_HEIGHT);

            drawContinuousFieldLines();

            for (let c of charges) {
                let radius = 10 + Math.abs(c.q) * 2; 
                
                ctx.beginPath();
                ctx.arc(c.x, c.y, radius, 0, Math.PI * 2);
                ctx.fillStyle = c.q > 0 ? '#ea4335' : '#4285f4';
                ctx.fill();
                
                ctx.fillStyle = 'white';
                ctx.font = '14px Roboto';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                let label = (c.q > 0 ? '+' : '') + c.q;
                ctx.fillText(label, c.x, c.y);
            }

            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
